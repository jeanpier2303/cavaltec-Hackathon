services:
  backend:
    build: .
    container_name: privacy_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - privacy_network

  mysql:
    image: mysql:8.0
    container_name: privacy_mysql
    ports:
      - "3310:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../hackent.sql:/docker-entrypoint-initdb.d/hackent.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - privacy_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: privacy_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - privacy_network

volumes:
  mysql_data:

networks:
  privacy_network:
    driver: bridge
